<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>電路維修專家 - 線路點對點真實通電版</title>
    <style>
        body { background: #050505; color: #eee; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        #ui-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 60px; 
            background: rgba(0, 20, 10, 0.9); border-bottom: 1px solid #00ffcc;
            display: flex; justify-content: center; align-items: center; gap: 30px;
            pointer-events: none; z-index: 10;
        }
        .stat-box { font-size: 20px; color: #00ffcc; text-shadow: 0 0 5px #00ffcc; font-weight: bold; }
        .stat-value { color: #fff; margin-left: 10px; }
        .warning { color: #ff3333; animation: pulse 1s infinite; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
            backdrop-filter: blur(5px);
        }
        h1 { color: #00ffcc; font-size: 48px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px #00ffcc; }
        p { font-size: 18px; color: #aaa; margin-bottom: 30px; max-width: 600px; line-height: 1.6; }
        button {
            padding: 15px 40px; font-size: 24px; color: #000; background: #00ffcc;
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 15px #00ffcc; transition: transform 0.2s;
        }
        button:hover { transform: scale(1.1); background: #fff; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        canvas { background: #000; border: 2px solid #333; cursor: pointer; display: block; margin: 60px auto 0; box-shadow: 0 0 30px #001100; }
    </style>
</head>
<body>

    <div id="ui-bar">
        <div class="stat-box">LEVEL <span id="level-disp" class="stat-value">1 / 3</span></div>
        <div class="stat-box">TIME <span id="time-disp" class="stat-value">60</span></div>
        <div class="stat-box">STATUS <span id="target-disp" class="stat-value">維修中</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="850"></canvas>

    <div id="overlay">
        <h1 id="overlay-title">電路維修專家</h1>
        <p id="overlay-desc">
            歡迎來到電力中樞。<br>
            <strong>Level 1 啟動。</strong><br>
            <span style="color:#ffff00">系統提示：此為解答確認模式，點擊開始檢視真實物理電力流向。</span>
        </p>
        <button id="overlay-btn" onclick="startGame()">確認連線</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelDisp = document.getElementById('level-disp');
        const timeDisp = document.getElementById('time-disp');
        const targetDisp = document.getElementById('target-disp');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const overlayBtn = document.getElementById('overlay-btn');

        const CX = 400; 
        const CY = 480; 

        let currentLevel = 1;
        let timeLeft = 60;
        let timerInterval = null;
        let isPlaying = false;
        let isLevelComplete = false;
        let hasPlayerMoved = false; 
        
        let nodes = [];
        let segments = [];
        let targets = [];

        // --- 1. 100% 忠於圖片的唯一解資料庫 ---
        const LEVELS = {
            1: {
                layers: 3, time: 60,
                data: [
                    // L0 (最外圈)
                    { types: ['T','T','L','T'], sol: [1, 3, 0, 1], offset: 0 }, 
                    // L1 (中圈)
                    { types: ['L','L','Y','T'], sol: [1, 1, 1, 2], offset: 0 }, 
                    // L2 (最內圈) - 修正：3點鐘L型向左轉1次 (由 1 變為 0，成為 └ 狀)
                    { types: ['Y','L','T','T'], sol: [0, 0, 1, 0], offset: 0 }  
                ],
                // 目標：正中央、最外圈左下角、中圈右上角
                targets: ['Center', 'L1_TR', 'L0_BL'], 
                // 修正：確實補回了 6 點鐘的跨圈連線，只移除內圈左下角
                removeSegs: ['L2_BL'] 
            },
            2: {
                layers: 3, time: 90,
                data: [
                    { types: ['T','L','L','T'], sol: [0, 3, 0, 1], offset: 2 }, 
                    { types: ['L','T','T','L'], sol: [1, 0, 1, 2], offset: 1 }, 
                    { types: ['T','T','L','L'], sol: [1, 1, 0, 2], offset: 2 }  
                ],
                targets: ['Center', 'L0_TR', 'L0_BL', 'L1_TR'],
                removeSegs: []
            },
            3: {
                layers: 4, time: 120,
                data: [
                    { types: ['T','T','T','T'], sol: [0, 3, 0, 1], offset: 2 }, 
                    { types: ['T','Y','T','T'], sol: [1, 3, 0, 1], offset: 3 }, 
                    { types: ['T','T','Y','T'], sol: [1, 0, 0, 1], offset: 2 }, 
                    { types: ['L','T','T','Y'], sol: [1, 1, 0, 3], offset: 3 }  
                ],
                targets: ['Center', 'L0_TR', 'L0_BL', 'L1_TL', 'L2_BR'],
                removeSegs: []
            }
        };

        // --- 2. 遊戲控制 ---
        function startGame() {
            currentLevel = 1;
            startLevel(currentLevel);
        }

        function startLevel(level) {
            const data = LEVELS[level];

            overlay.style.display = 'none';
            levelDisp.innerText = `${level} / 3`;
            timeLeft = data.time;
            timeDisp.innerText = timeLeft;
            timeDisp.className = "stat-value";
            targetDisp.innerText = `維修中...`;
            targetDisp.style.color = "#fff";
            
            isPlaying = true;
            isLevelComplete = false;
            hasPlayerMoved = data.data.every(layer => layer.offset === 0) ? true : false;

            initExactMap(level);
            
            calculatePower();
            draw();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPlaying || isLevelComplete) return;
                timeLeft--;
                timeDisp.innerText = timeLeft;
                if (timeLeft <= 10) timeDisp.className = "stat-value warning";
                if (timeLeft <= 0) gameOver();
            }, 1000);
        }

        function levelCleared() {
            isLevelComplete = true;
            targetDisp.style.color = "#00ff00";
            targetDisp.innerText = "連線成功!";
            
            let msg = `Level ${currentLevel} 完成！<br>電路已完美接通。<br>剩餘時間: ${timeLeft} 秒`;
            let btn = "前往下一關";
            let action = nextLevel;

            if (currentLevel >= 3) {
                msg = "恭喜！全數關卡已修復完成。<br>您是真正的電路大師。";
                btn = "重新開始";
                action = startGame;
            }
            
            setTimeout(() => {
                showOverlay("系統恢復", msg, btn, action);
            }, 500);
        }

        function nextLevel() {
            currentLevel++;
            startLevel(currentLevel);
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(timerInterval);
            showOverlay("電力中斷", `時間耗盡！Level ${currentLevel} 挑戰失敗。`, "重試本關", () => startLevel(currentLevel));
        }

        function showOverlay(title, desc, btnText, callback) {
            overlayTitle.innerHTML = title;
            overlayDesc.innerHTML = desc;
            overlayBtn.innerText = btnText;
            overlayBtn.onclick = callback;
            overlay.style.display = 'flex';
        }

        // --- 3. 完美還原地圖拓樸 (包含角落吸收器設計) ---
        function addSeg(id1, id2, d1, d2, pts, tag) {
            segments.push({ from: id1, to: id2, fromDir: d1, toDir: d2, points: pts, powered: false, tag: tag });
        }

        function initExactMap(level) {
            const data = LEVELS[level];
            nodes = [];
            segments = [];
            targets = [];
            
            let boxSizes = (data.layers === 3) ? [500, 340, 180] : [600, 460, 320, 180];
            const lc = data.layers;

            boxSizes.forEach((size, i) => {
                const half = size / 2;
                const layerNum = lc - i; 
                const layerData = data.data[i];
                
                const positions = [
                    { x: CX, y: CY - half },      // Top
                    { x: CX + half, y: CY },      // Right
                    { x: CX, y: CY + half },      // Bottom
                    { x: CX - half, y: CY }       // Left
                ];

                for (let j = 0; j < 4; j++) {
                    let type = layerData.types[j];
                    let solRot = layerData.sol[j];
                    let initRot = (solRot - layerData.offset + 4) % 4;
                    
                    let idSuffix = ['T', 'R', 'B', 'L'][j];
                    nodes.push({ 
                        id: `L${i}_${idSuffix}`, 
                        layer: i, x: positions[j].x, y: positions[j].y, 
                        type: type, rot: initRot, solRot: solRot, 
                        display: layerNum 
                    });
                }
            });

            addSeg('SOURCE', 'L0_T', 2, 0, [[CX, 70], [CX, CY - boxSizes[0]/2 - 50]], 'SRC');
            
            for(let i=0; i<lc-1; i++) {
                addSeg(`L${i}_T`, `L${i+1}_T`, 2, 0, [[CX, CY-boxSizes[i]/2], [CX, CY-boxSizes[i+1]/2]], 'AXIS');
                addSeg(`L${i}_B`, `L${i+1}_B`, 0, 2, [[CX, CY+boxSizes[i]/2], [CX, CY+boxSizes[i+1]/2]], 'AXIS'); // 這裡已經補回 6 點鐘的跨圈軸心線
                addSeg(`L${i}_L`, `L${i+1}_L`, 1, 3, [[CX-boxSizes[i]/2, CY], [CX-boxSizes[i+1]/2, CY]], 'AXIS');
                addSeg(`L${i}_R`, `L${i+1}_R`, 3, 1, [[CX+boxSizes[i]/2, CY], [CX+boxSizes[i+1]/2, CY]], 'AXIS');
            }
            
            addSeg(`L${lc-1}_T`, `L${lc-1}_B`, 2, 0, [[CX, CY-boxSizes[lc-1]/2], [CX, CY+boxSizes[lc-1]/2]], 'CENTER_V'); 

            boxSizes.forEach((size, i) => {
                const h = size/2;
                addSeg(`L${i}_T`, `L${i}_R`, 1, 0, [[CX, CY-h], [CX+h, CY-h], [CX+h, CY]], `L${i}_TR`);
                addSeg(`L${i}_R`, `L${i}_B`, 2, 1, [[CX+h, CY], [CX+h, CY+h], [CX, CY+h]], `L${i}_BR`);
                addSeg(`L${i}_B`, `L${i}_L`, 3, 2, [[CX, CY+h], [CX-h, CY+h], [CX-h, CY]], `L${i}_BL`);
                addSeg(`L${i}_L`, `L${i}_T`, 0, 3, [[CX-h, CY], [CX-h, CY-h], [CX, CY-h]], `L${i}_TL`);
            });

            data.removeSegs.forEach(tagToRemove => {
                let idx = segments.findIndex(s => s.tag === tagToRemove);
                if (idx !== -1) segments.splice(idx, 1);
            });

            // 物理引擎核心：將目標角落的連線物理切斷，使電力撞擊目標後自然終止
            data.targets.forEach(tName => {
                let tx = 0, ty = 0;
                if (tName === 'Center') {
                    tx = CX; ty = CY;
                    targets.push({ name: tName, x: tx, y: ty, powered: false });
                } else {
                    let parts = tName.split('_'); 
                    let layerIdx = parseInt(parts[0].replace('L', ''));
                    let corner = parts[1];
                    let h = boxSizes[layerIdx]/2;
                    
                    if (corner === 'TR') { tx = CX + h; ty = CY - h; }
                    if (corner === 'BR') { tx = CX + h; ty = CY + h; }
                    if (corner === 'BL') { tx = CX - h; ty = CY + h; }
                    if (corner === 'TL') { tx = CX - h; ty = CY - h; }
                    
                    targets.push({ name: tName, x: tx, y: ty, powered: false });

                    let sIdx = segments.findIndex(s => s.tag === tName);
                    if (sIdx !== -1) {
                        let seg = segments[sIdx];
                        segments.splice(sIdx, 1); 
                        
                        let ptStart = seg.points[0];
                        let ptCorner = seg.points[1];
                        let ptEnd = seg.points[2];

                        segments.push({
                            from: seg.from, to: 'NONE', fromDir: seg.fromDir, toDir: 0, 
                            points: [ptStart, ptCorner], powered: false, tag: tName + '_A'
                        });
                        segments.push({
                            from: seg.to, to: 'NONE', fromDir: seg.toDir, toDir: 0, 
                            points: [ptEnd, ptCorner], powered: false, tag: tName + '_B'
                        });
                    }
                }
            });
        }

        // --- 4. 真實電力傳導與唯一解判定 ---
        function calculatePower() {
            nodes.forEach(n => n.powered = false);
            segments.forEach(s => s.powered = false);
            targets.forEach(t => t.powered = false);

            let queue = []; 
            let startSeg = segments.find(s => s.tag === 'SRC');
            
            let l0_t = nodes.find(n => n.id === 'L0_T');
            if (l0_t && canEnter(l0_t, 0) && startSeg) { 
                startSeg.powered = true;
                queue.push({ nodeId: 'L0_T', entryPort: 0 }); 
            }

            let visited = new Set();

            while(queue.length > 0) {
                let curr = queue.shift();
                let node = nodes.find(n => n.id === curr.nodeId);
                if (!node) continue;
                
                let stateKey = `${node.id}_${curr.entryPort}`;
                if (visited.has(stateKey)) continue;
                visited.add(stateKey);
                
                node.powered = true; 

                let exitPorts = getExitPorts(node.type, node.rot, curr.entryPort);

                exitPorts.forEach(exitPort => {
                    let seg = segments.find(s => 
                        (s.from === node.id && s.fromDir === exitPort) || 
                        (s.to === node.id && s.toDir === exitPort)
                    );

                    if (seg) {
                        seg.powered = true;
                        let neighborId = (seg.from === node.id) ? seg.to : seg.from;
                        let neighborEntryPort = (seg.from === node.id) ? seg.toDir : seg.fromDir;
                        
                        let neighbor = nodes.find(n => n.id === neighborId);
                        if (neighbor && canEnter(neighbor, neighborEntryPort)) {
                            queue.push({ nodeId: neighborId, entryPort: neighborEntryPort });
                        }
                    }
                });
            }

            targets.forEach(t => {
                if (t.name === 'Center') {
                    let cSeg = segments.find(s => s.tag === 'CENTER_V');
                    if (cSeg && cSeg.powered) t.powered = true;
                } else {
                    let segA = segments.find(s => s.tag === t.name + '_A');
                    let segB = segments.find(s => s.tag === t.name + '_B');
                    if ((segA && segA.powered) || (segB && segB.powered)) {
                        t.powered = true;
                    }
                }
            });

            let isPerfectMatch = nodes.every(n => n.rot === n.solRot);

            if (isPerfectMatch && hasPlayerMoved) {
                targetDisp.innerText = `OK`;
                levelCleared();
            } else {
                targetDisp.innerText = `維修中...`;
            }
        }

        function canEnter(node, port) {
            if (node.type === 'T') {
                let blockedPort = (node.rot + 2) % 4; 
                return port !== blockedPort;
            }
            if (node.type === 'L') {
                return port === node.rot || port === (node.rot + 1) % 4;
            }
            if (node.type === 'Y') return true;
            return false;
        }

        function getExitPorts(type, rot, entryPort) {
            let exits = [];
            if (type === 'T') {
                let block = (rot + 2) % 4;
                [0, 1, 2, 3].forEach(p => {
                    if (p !== block && p !== entryPort) exits.push(p);
                });
            } else if (type === 'L') {
                let p1 = rot, p2 = (rot + 1) % 4;
                if (entryPort === p1) exits.push(p2);
                if (entryPort === p2) exits.push(p1);
            } else if (type === 'Y') {
                let pairs = (rot % 2 === 0) ? [[0, 3], [1, 2]] : [[0, 1], [2, 3]];
                pairs.forEach(pair => {
                    if (pair[0] === entryPort) exits.push(pair[1]);
                    if (pair[1] === entryPort) exits.push(pair[0]);
                });
            }
            return exits;
        }

        // --- 5. 繪圖引擎 ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#1a1a1a"; ctx.fillRect(CX - 50, 20, 100, 50);
            ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 2; ctx.setLineDash([]); ctx.strokeRect(CX - 50, 20, 100, 50);
            ctx.fillStyle = "#00ffcc"; ctx.font = "bold 16px Arial"; ctx.fillText("POWER", CX - 30, 52);

            segments.forEach(seg => {
                ctx.beginPath();
                if (seg.powered) {
                    ctx.strokeStyle = "#00ffcc"; ctx.setLineDash([]); ctx.lineWidth = 4;
                    ctx.shadowBlur = 15; ctx.shadowColor = "#00ffcc";
                } else {
                    ctx.strokeStyle = "#333"; ctx.setLineDash([5, 8]); ctx.lineWidth = 2;
                    ctx.shadowBlur = 0;
                }
                if(seg.points.length > 0) {
                    ctx.moveTo(seg.points[0][0], seg.points[0][1]);
                    for(let i=1; i<seg.points.length; i++) ctx.lineTo(seg.points[i][0], seg.points[i][1]);
                }
                ctx.stroke();
            });
            ctx.shadowBlur = 0;

            targets.forEach(t => {
                ctx.beginPath();
                if (t.powered) {
                    ctx.fillStyle = "#00ff00"; ctx.strokeStyle = "#00ffcc"; ctx.shadowBlur = 20; ctx.shadowColor = "#00ff00";
                } else {
                    ctx.fillStyle = "#003311"; ctx.strokeStyle = "#006644"; ctx.shadowBlur = 0;
                }
                ctx.arc(t.x, t.y, 20, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = t.powered ? "#ffffff" : "#005533";
                ctx.beginPath(); ctx.arc(t.x, t.y, 6, 0, Math.PI*2); ctx.fill();
            });
            ctx.shadowBlur = 0;

            nodes.forEach(n => {
                ctx.strokeStyle = "red"; ctx.lineWidth = 2; ctx.setLineDash([]);
                ctx.strokeRect(n.x - 25, n.y - 25, 50, 50);

                ctx.fillStyle = "#ff5555"; ctx.font = "bold 12px Arial";
                ctx.fillText(n.display, n.x + 15, n.y - 15);

                ctx.save();
                ctx.translate(n.x, n.y);
                ctx.rotate(n.rot * Math.PI / 2);
                
                let color = n.powered ? "#ffffff" : "#0055aa";
                if (n.type === 'Y') color = n.powered ? "#ffffcc" : "#eebb00";

                ctx.strokeStyle = color;
                ctx.lineWidth = 4; ctx.lineCap = "round";
                
                if (n.type === 'T') {
                    ctx.beginPath();
                    ctx.moveTo(-15, 0); ctx.lineTo(15, 0); 
                    ctx.moveTo(0, 0); ctx.lineTo(0, -15);
                    ctx.stroke();
                } else if (n.type === 'L') {
                    ctx.beginPath();
                    ctx.moveTo(0, -15); ctx.lineTo(0, 0); ctx.lineTo(15, 0);
                    ctx.stroke();
                } else if (n.type === 'Y') { 
                    ctx.beginPath();
                    ctx.moveTo(0, -20); ctx.lineTo(0, -5); ctx.lineTo(-5, 0); ctx.lineTo(-20, 0);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, 20); ctx.lineTo(0, 5); ctx.lineTo(5, 0); ctx.lineTo(20, 0);
                    ctx.stroke();
                }
                ctx.restore();
            });
        }

        canvas.addEventListener('click', (e) => {
            if (!isPlaying || isLevelComplete) return;

            hasPlayerMoved = true;

            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            let clickedLayer = -1;
            for (let n of nodes) {
                if (mx > n.x - 25 && mx < n.x + 25 && my > n.y - 25 && my < n.y + 25) {
                    clickedLayer = n.layer;
                    break;
                }
            }

            if (clickedLayer !== -1) {
                nodes.forEach(n => {
                    if (n.layer === clickedLayer) n.rot = (n.rot + 1) % 4;
                });
                calculatePower();
                draw();
            }
        });

    </script>
</body>
</html>
