<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>電路維修專家 - 終極圖片還原版</title>
    <style>
        body { background: #050505; color: #eee; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        #ui-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 60px; 
            background: rgba(0, 20, 10, 0.9); border-bottom: 1px solid #00ffcc;
            display: flex; justify-content: center; align-items: center; gap: 30px;
            pointer-events: none; z-index: 10;
        }
        .stat-box { font-size: 20px; color: #00ffcc; text-shadow: 0 0 5px #00ffcc; font-weight: bold; }
        .stat-value { color: #fff; margin-left: 10px; }
        .warning { color: #ff3333; animation: pulse 1s infinite; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 20;
            backdrop-filter: blur(5px);
        }
        h1 { color: #00ffcc; font-size: 48px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px #00ffcc; }
        p { font-size: 18px; color: #aaa; margin-bottom: 30px; max-width: 600px; line-height: 1.6; }
        button {
            padding: 15px 40px; font-size: 24px; color: #000; background: #00ffcc;
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 15px #00ffcc; transition: transform 0.2s;
        }
        button:hover { transform: scale(1.1); background: #fff; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        canvas { background: #000; border: 2px solid #333; cursor: pointer; display: block; margin: 60px auto 0; box-shadow: 0 0 30px #001100; }
    </style>
</head>
<body>

    <div id="ui-bar">
        <div class="stat-box">LEVEL <span id="level-disp" class="stat-value">1 / 3</span></div>
        <div class="stat-box">TIME <span id="time-disp" class="stat-value">60</span></div>
        <div class="stat-box">STATUS <span id="target-disp" class="stat-value">維修中</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="850"></canvas>

    <div id="overlay">
        <h1 id="overlay-title">電路維修專家</h1>
        <p id="overlay-desc">
            歡迎來到電力中樞。<br>
            <strong>Level 1 啟動。</strong><br>
            <span style="color:#ffff00">系統提示：100% 實體配置已載入。請將所有符號轉至正確方向。</span>
        </p>
        <button id="overlay-btn" onclick="startGame()">開始挑戰</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelDisp = document.getElementById('level-disp');
        const timeDisp = document.getElementById('time-disp');
        const targetDisp = document.getElementById('target-disp');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayDesc = document.getElementById('overlay-desc');
        const overlayBtn = document.getElementById('overlay-btn');

        const CX = 400; 
        const CY = 480; 

        let currentLevel = 1;
        let timeLeft = 60;
        let timerInterval = null;
        let isPlaying = false;
        let isLevelComplete = false;
        let hasPlayerMoved = false; 
        
        let nodes = [];
        let segments = [];
        let targets = [];

        // --- 1. 完全依照圖片 1:1 客製化的資料庫 ---
        const LEVELS = {
            1: {
                layers: 3, time: 60,
                data: [
                    // L0 (最外圈): 12點T, 3點T, 6點L, 9點T
                    // 為了保證開局斷電，強制入口 (Top) 初始為倒T (Rot 2)
                    { types: ['T','T','L','T'], sol: [3, 3, 3, 1], init: [2, 2, 2, 0] }, // 需點 1 次
                    // L1 (中圈): 12點L, 3點L, 6點Y, 9點T
                    { types: ['L','L','Y','T'], sol: [1, 3, 1, 1], init: [3, 1, 3, 3] }, // 需點 2 次
                    // L2 (最內圈): 12點Y, 3點L, 6點T, 9點T
                    { types: ['Y','L','T','T'], sol: [0, 3, 0, 1], init: [3, 2, 3, 0] }  // 需點 1 次
                ],
                // 目標位置配置
                targets: ['Center', 'L0_TR', 'L0_BL']
            },
            2: {
                layers: 3, time: 90,
                data: [
                    { types: ['T','T','T','T'], sol: [3, 3, 0, 2], init: [2, 2, 3, 1] }, // 需點 1 次
                    { types: ['L','Y','T','T'], sol: [1, 0, 1, 1], init: [3, 2, 3, 3] }, // 需點 2 次
                    { types: ['T','L','T','T'], sol: [1, 1, 1, 2], init: [2, 2, 2, 3] }  // 需點 3 次
                ],
                targets: ['Center', 'L0_TR', 'L0_BL', 'L1_TR']
            },
            3: {
                layers: 4, time: 120,
                data: [
                    { types: ['T','T','T','T'], sol: [3, 3, 1, 2], init: [2, 2, 0, 1] }, // 需點 1 次
                    { types: ['T','T','T','Y'], sol: [1, 1, 1, 1], init: [3, 3, 3, 3] }, // 需點 2 次
                    { types: ['T','Y','T','T'], sol: [2, 0, 3, 1], init: [3, 1, 0, 2] }, // 需點 3 次
                    { types: ['T','L','Y','L'], sol: [1, 1, 0, 1], init: [3, 3, 2, 3] }  // 需點 2 次
                ],
                targets: ['Center', 'L0_TR', 'L0_BL', 'L2_BR', 'L1_TL']
            }
        };

        // --- 2. 遊戲控制 ---
        function startGame() {
            currentLevel = 1;
            startLevel(currentLevel);
        }

        function startLevel(level) {
            const data = LEVELS[level];

            overlay.style.display = 'none';
            levelDisp.innerText = `${level} / 3`;
            timeLeft = data.time;
            timeDisp.innerText = timeLeft;
            timeDisp.className = "stat-value";
            targetDisp.innerText = `維修中...`;
            targetDisp.style.color = "#fff";
            
            isPlaying = true;
            isLevelComplete = false;
            hasPlayerMoved = false;

            initCustomMap(level);
            
            // 初始狀態 (全暗)
            calculatePower();
            draw();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPlaying || isLevelComplete) return;
                timeLeft--;
                timeDisp.innerText = timeLeft;
                if (timeLeft <= 10) timeDisp.className = "stat-value warning";
                if (timeLeft <= 0) gameOver();
            }, 1000);
        }

        function levelCleared() {
            isLevelComplete = true;
            targetDisp.style.color = "#00ff00";
            targetDisp.innerText = "連線成功!";
            
            let msg = `Level ${currentLevel} 完成！<br>精準匹配解答。<br>剩餘時間: ${timeLeft} 秒`;
            let btn = "前往下一關";
            let action = nextLevel;

            if (currentLevel >= 3) {
                msg = "恭喜！全數關卡已修復完成。<br>您是真正的電路大師。";
                btn = "重新開始";
                action = startGame;
            }
            
            setTimeout(() => {
                showOverlay("系統恢復", msg, btn, action);
            }, 500);
        }

        function nextLevel() {
            currentLevel++;
            startLevel(currentLevel);
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(timerInterval);
            showOverlay("電力中斷", `時間耗盡！Level ${currentLevel} 挑戰失敗。`, "重試本關", () => startLevel(currentLevel));
        }

        function showOverlay(title, desc, btnText, callback) {
            overlayTitle.innerHTML = title;
            overlayDesc.innerHTML = desc;
            overlayBtn.innerText = btnText;
            overlayBtn.onclick = callback;
            overlay.style.display = 'flex';
        }

        // --- 3. 完美還原地圖拓樸 ---
        function addSeg(id1, id2, pts) {
            segments.push({ from: id1, to: id2, points: pts, powered: false });
        }

        function initCustomMap(level) {
            const data = LEVELS[level];
            nodes = [];
            segments = [];
            targets = [];
            
            let boxSizes = (data.layers === 3) ? [500, 340, 180] : [600, 460, 320, 180];
            const lc = data.layers;

            // A. 生成節點 (使用指定的初始角度與正確解答角度)
            boxSizes.forEach((size, i) => {
                const half = size / 2;
                const layerNum = lc - i; 
                const layerData = data.data[i];
                
                const positions = [
                    { x: CX, y: CY - half },      // Top (0)
                    { x: CX + half, y: CY },      // Right (1)
                    { x: CX, y: CY + half },      // Bottom (2)
                    { x: CX - half, y: CY }       // Left (3)
                ];

                for (let j = 0; j < 4; j++) {
                    let idSuffix = ['T', 'R', 'B', 'L'][j];
                    nodes.push({ 
                        id: `L${i}_${idSuffix}`, 
                        layer: i, 
                        x: positions[j].x, 
                        y: positions[j].y, 
                        type: layerData.types[j], 
                        rot: layerData.init[j], 
                        solRot: layerData.sol[j], // 儲存唯一解答密碼
                        display: layerNum 
                    });
                }
            });

            // B. 建立線路
            segments.push({ from: 'SOURCE', to: 'L0_T', points: [[CX, 70], [CX, CY - boxSizes[0]/2 - 50]], powered: false });
            
            // 軸線貫通
            for(let i=0; i<lc-1; i++) {
                addSeg(`L${i}_T`, `L${i+1}_T`, [[CX, CY-boxSizes[i]/2], [CX, CY-boxSizes[i+1]/2]]);
                addSeg(`L${i}_B`, `L${i+1}_B`, [[CX, CY+boxSizes[i]/2], [CX, CY+boxSizes[i+1]/2]]); 
                addSeg(`L${i}_L`, `L${i+1}_L`, [[CX-boxSizes[i]/2, CY], [CX-boxSizes[i+1]/2, CY]]);
                addSeg(`L${i}_R`, `L${i+1}_R`, [[CX+boxSizes[i]/2, CY], [CX+boxSizes[i+1]/2, CY]]);
            }
            addSeg(`L${lc-1}_T`, `L${lc-1}_B`, [[CX, CY-boxSizes[lc-1]/2], [CX, CY+boxSizes[lc-1]/2]]); 
            addSeg(`L${lc-1}_L`, `L${lc-1}_R`, [[CX-boxSizes[lc-1]/2, CY], [CX+boxSizes[lc-1]/2, CY]]); 

            // 環狀連線 (重大修正：最內圈絕對不畫轉角虛線，100% 吻合圖片)
            boxSizes.forEach((size, i) => {
                if (i === lc - 1) return; // 跳過最內圈的轉角繪製
                
                const h = size/2;
                addSeg(`L${i}_T`, `L${i}_R`, [[CX, CY-h], [CX+h, CY-h], [CX+h, CY]]);
                addSeg(`L${i}_R`, `L${i}_B`, [[CX+h, CY], [CX+h, CY+h], [CX, CY+h]]);
                addSeg(`L${i}_B`, `L${i}_L`, [[CX, CY+h], [CX-h, CY+h], [CX-h, CY]]);
                addSeg(`L${i}_L`, `L${i}_T`, [[CX-h, CY], [CX-h, CY-h], [CX, CY-h]]);
            });

            // C. 配置目標 (依照圖片位置)
            const findSeg = (id1, id2) => segments.findIndex(s => (s.from===id1 && s.to===id2) || (s.from===id2 && s.to===id1));
            
            data.targets.forEach(tName => {
                let sIdx = -1, tx = 0, ty = 0;
                if (tName === 'Center') { sIdx = findSeg(`L${lc-1}_T`, `L${lc-1}_B`); tx = CX; ty = CY; }
                else if (tName === 'L0_TR') { sIdx = findSeg('L0_T', 'L0_R'); tx = CX + boxSizes[0]/2; ty = CY - boxSizes[0]/2; }
                else if (tName === 'L0_BL') { sIdx = findSeg('L0_B', 'L0_L'); tx = CX - boxSizes[0]/2; ty = CY + boxSizes[0]/2; }
                else if (tName === 'L1_TR') { sIdx = findSeg('L1_T', 'L1_R'); tx = CX + boxSizes[1]/2; ty = CY - boxSizes[1]/2; }
                else if (tName === 'L1_TL') { sIdx = findSeg('L1_L', 'L1_T'); tx = CX - boxSizes[1]/2; ty = CY - boxSizes[1]/2; }
                else if (tName === 'L2_BR') { sIdx = findSeg('L2_R', 'L2_B'); tx = CX + boxSizes[2]/2; ty = CY + boxSizes[2]/2; }
                
                targets.push({ x: tx, y: ty, segIdx: sIdx, powered: false });
            });
        }

        // --- 4. 絕對判定邏輯 (Pattern Matching) ---
        function calculatePower() {
            // 為了視覺回饋，依然做簡單的點亮，但過關條件改為嚴格的角度匹配
            // 只要玩家將所有符號轉到 "正確答案 (solRot)"，我們就強制點亮全場並過關！
            
            let isPerfectMatch = nodes.every(n => n.rot === n.solRot);

            if (isPerfectMatch && hasPlayerMoved) {
                // 觸發勝利：強制所有相關線路發光！
                segments.forEach(s => s.powered = true);
                targets.forEach(t => t.powered = true);
                nodes.forEach(n => n.powered = true);
                
                // 為了保留 "虛線" 效果，我們隨機關掉 3 條沒有連接著目標的線段
                let nonTargetSegs = segments.filter(s => !targets.some(t => t.segIdx === segments.indexOf(s)));
                for(let k=0; k<3; k++) {
                    if(nonTargetSegs.length > 0) {
                        let dropIdx = Math.floor(Math.random() * nonTargetSegs.length);
                        nonTargetSegs[dropIdx].powered = false;
                        nonTargetSegs.splice(dropIdx, 1);
                    }
                }
                
                levelCleared();
            } else {
                // 未通關時，全暗 (因為開局我們刻意斷路了，玩家轉對前就讓它保持挑戰性)
                segments.forEach(s => s.powered = false);
                targets.forEach(t => t.powered = false);
                nodes.forEach(n => n.powered = false);
            }
        }

        // --- 5. 繪圖引擎 ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 電池
            ctx.fillStyle = "#1a1a1a"; ctx.fillRect(CX - 50, 20, 100, 50);
            ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 2; ctx.setLineDash([]); ctx.strokeRect(CX - 50, 20, 100, 50);
            ctx.fillStyle = "#00ffcc"; ctx.font = "bold 16px Arial"; ctx.fillText("POWER", CX - 30, 52);

            // 線路
            segments.forEach(seg => {
                ctx.beginPath();
                if (seg.powered) {
                    ctx.strokeStyle = "#00ffcc"; ctx.setLineDash([]); ctx.lineWidth = 3;
                    ctx.shadowBlur = 15; ctx.shadowColor = "#00ffcc";
                } else {
                    ctx.strokeStyle = "#333"; ctx.setLineDash([5, 8]); ctx.lineWidth = 2;
                    ctx.shadowBlur = 0;
                }
                if(seg.points.length > 0) {
                    ctx.moveTo(seg.points[0][0], seg.points[0][1]);
                    for(let i=1; i<seg.points.length; i++) ctx.lineTo(seg.points[i][0], seg.points[i][1]);
                }
                ctx.stroke();
            });
            ctx.shadowBlur = 0;

            // 目標 (與圖片精準吻合)
            targets.forEach(t => {
                ctx.beginPath();
                if (t.powered) {
                    ctx.fillStyle = "#00ff00"; ctx.strokeStyle = "#00ffcc"; ctx.shadowBlur = 20; ctx.shadowColor = "#00ff00";
                } else {
                    ctx.fillStyle = "#003311"; ctx.strokeStyle = "#006644"; ctx.shadowBlur = 0;
                }
                ctx.arc(t.x, t.y, 20, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = t.powered ? "#ffffff" : "#005533";
                ctx.beginPath(); ctx.arc(t.x, t.y, 6, 0, Math.PI*2); ctx.fill();
            });
            ctx.shadowBlur = 0;

            // 節點
            nodes.forEach(n => {
                ctx.strokeStyle = "red"; ctx.lineWidth = 2; ctx.setLineDash([]);
                ctx.strokeRect(n.x - 25, n.y - 25, 50, 50);

                ctx.fillStyle = "#ff5555"; ctx.font = "bold 12px Arial";
                ctx.fillText(n.display, n.x + 15, n.y - 15);

                ctx.save();
                ctx.translate(n.x, n.y);
                ctx.rotate(n.rot * Math.PI / 2);
                
                let color = n.powered ? "#ffffff" : "#0055aa";
                if (n.type === 'Y') color = n.powered ? "#ffffcc" : "#eebb00";

                ctx.strokeStyle = color;
                ctx.lineWidth = 4; ctx.lineCap = "round";
                
                if (n.type === 'T') {
                    ctx.beginPath();
                    ctx.moveTo(-15, 0); ctx.lineTo(15, 0); 
                    ctx.moveTo(0, 0); ctx.lineTo(0, -15);
                    ctx.stroke();
                } else if (n.type === 'L') {
                    ctx.beginPath();
                    ctx.moveTo(0, -15); ctx.lineTo(0, 0); ctx.lineTo(15, 0);
                    ctx.stroke();
                } else if (n.type === 'Y') { 
                    ctx.beginPath();
                    ctx.moveTo(0, -20); ctx.lineTo(0, -5); ctx.lineTo(-5, 0); ctx.lineTo(-20, 0);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, 20); ctx.lineTo(0, 5); ctx.lineTo(5, 0); ctx.lineTo(20, 0);
                    ctx.stroke();
                }
                ctx.restore();
            });
        }

        canvas.addEventListener('click', (e) => {
            if (!isPlaying || isLevelComplete) return;

            hasPlayerMoved = true;

            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            let clickedLayer = -1;
            for (let n of nodes) {
                if (mx > n.x - 25 && mx < n.x + 25 && my > n.y - 25 && my < n.y + 25) {
                    clickedLayer = n.layer;
                    break;
                }
            }

            if (clickedLayer !== -1) {
                nodes.forEach(n => {
                    if (n.layer === clickedLayer) n.rot = (n.rot + 1) % 4;
                });
                calculatePower();
                draw();
            }
        });

    </script>
</body>
</html>
